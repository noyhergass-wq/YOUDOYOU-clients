<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU DO YOU — ניהול לקוחות</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f4f1; color: #1a1a1a; direction: rtl; font-size: 14px; }
    .header { background: #1a1a2e; padding: 28px; text-align: center; color: #e8b86d; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header small { display: block; color: rgba(255,255,255,0.6); font-size: 12px; }
    .tabs { background: #fff; border-bottom: 1px solid #eee; padding: 0 24px; display: flex; }
    .tabs button { padding: 14px 20px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 14px; font-weight: 500; }
    .tabs button.active { color: #1a1a2e; border-bottom-color: #e8b86d; }
    .tabs button:hover { color: #444; }
    .container { padding: 24px 28px; max-width: 960px; margin: 0 auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .sec-title { font-size: 13px; font-weight: 600; color: #1a1a2e; background: #f8f7f4; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-row.full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11.5px; color: #999; }
    .field input, .field select, .field textarea { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px; font-size: 13.5px; direction: rtl; font-family: inherit; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #e8b86d; }
    .field textarea { height: 80px; resize: vertical; }
    .checkbox-list { list-style: none; }
    .checkbox-list li { padding: 8px 0; border-bottom: 1px solid #f2f2f2; display: flex; gap: 10px; }
    .checkbox-list li:last-child { border-bottom: none; }
    .checkbox-list input { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-list label { cursor: pointer; flex: 1; }
    .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin: 8px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #e8b86d, #c89040); transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #999; text-align: center; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: right; padding: 10px; font-weight: 600; background: #fafafa; border-bottom: 1px solid #eee; font-size: 12px; color: #999; }
    td { padding: 12px 10px; border-bottom: 1px solid #f2f2f2; }
    tr:hover td { background: #fefdfb; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-active { background: #d4edda; color: #155724; }
    .summary { display: flex; gap: 16px; margin-bottom: 20px; }
    .summary-card { flex: 1; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; }
    .summary-card .label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .summary-card .value { font-size: 24px; font-weight: 600; color: #1a1a2e; }
  </style>
</head>
<body>

<div class="header">
  <h1>YOU DO YOU</h1>
  <small>| ניהול משרד מרחוק</small>
  <div id="date-header" style="color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 6px;"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('onboarding', this)">אונבורדינג</button>
  <button class="tab-btn" onclick="showTab('card', this)">כרטיס לקוח</button>
  <button class="tab-btn" onclick="showTab('tracker', this)">טרקר לקוחות</button>
</div>

<div class="container">

<div class="tab active" id="onboarding">
  <div class="card">
    <div class="sec-title">שלב 1 — סגירה עסקית</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת תשלום ראשון</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הסכם</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת הסכם חתום</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת הו"ק</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תיאום שיחת אפיון</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שמירת הסכם</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הודעת ברוכים הבאים</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="sec-title">שלב 2 — אפיון</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>מילוי כרטיס לקוח</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת אנשי קשר</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>גישה ליומן גוגל</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>גישה לחשבוניות</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="sec-title">שלב 3 — הקמה</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הוספה לטרקר</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תזכורת גבייה</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>צ'ק-אין</label></li>
    </ul>
    <div class="progress-text" id="prog-text">0 / 14 סעיפים (0%)</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width: 0%;"></div></div>
  </div>
</div>

<div class="tab" id="card">
  <div class="card">
    <div class="sec-title">בחר לקוח</div>
    <select id="client-select" onchange="loadClient()" style="width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; direction: rtl;">
      <option value="">-- בחר לקוח --</option>
      <option value="0">נובו נדל"ן</option>
    </select>
  </div>
  <div id="client-form" style="display: none;">
    <div class="card">
      <div class="sec-title">פרטים בסיסיים</div>
      <div class="field-row">
        <div class="field"><label>שם הלקוח</label><input type="text" value="נובו נדל"ן"></div>
        <div class="field"><label>אתר</label><input type="text" value="noovo.co.il"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>טלפון 1</label><input type="tel" value="053-250-2992"></div>
        <div class="field"><label>טלפון 2</label><input type="tel" value="050-4585425"></div>
      </div>
    </div>
  </div>
</div>

<div class="tab" id="tracker">
  <div class="summary">
    <div class="summary-card">
      <div class="label">לקוחות פעילים</div>
      <div class="value">1</div>
    </div>
    <div class="summary-card">
      <div class="label">הכנסה חודשית</div>
      <div class="value">₪4,700</div>
    </div>
    <div class="summary-card">
      <div class="label">סה"כ לקוחות</div>
      <div class="value">1</div>
    </div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>לקוח</th><th>חבילה</th><th>סכום</th><th>סטטוס</th></tr></thead>
      <tbody><tr><td>נובו נדל"ן</td><td>25 שעות</td><td>₪4,700</td><td><span class="badge badge-active">פעיל</span></td></tr></tbody>
    </table>
  </div>
</div>

</div>

<script>
function showTab(name, btn) {
  var onb = document.getElementById('onboarding');
  var card = document.getElementById('card');
  var track = document.getElementById('tracker');
  if (onb) onb.style.display = 'none';
  if (card) card.style.display = 'none';
  if (track) track.style.display = 'none';
  var target = document.getElementById(name);
  if (target) target.style.display = 'block';
  var btns = document.querySelectorAll('.tab-btn');
  for (var j = 0; j < btns.length; j++) {
    btns[j].classList.remove('active');
  }
  if (btn) btn.classList.add('active');
}

function updateProgress() {
  var all = document.querySelectorAll('.chk');
  var done = 0;
  for (var i = 0; i < all.length; i++) {
    if (all[i].checked) done++;
  }
  var pct = Math.round(done / all.length * 100);
  var fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = pct + '%';
  var txt = document.getElementById('prog-text');
  if (txt) txt.textContent = done + ' / ' + all.length + ' (' + pct + '%)';
}

function loadClient() {
  var sel = document.getElementById('client-select');
  var form = document.getElementById('client-form');
  if (form) form.style.display = sel.value ? 'block' : 'none';
}

var d = new Date();
var hdr = document.getElementById('date-header');
if (hdr) hdr.textContent = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
</script>

</body>
</html>
