<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>YOU DO YOU</title><style>:root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f5f4f1;color:#1a1a1a;direction:rtl;font-size:14px}.header{background:#1a1a2e;padding:28px;display:flex;flex-direction:column;align-items:center;text-align:center}.logo{color:#e8b86d;font-size:28px;font-weight:700}.logo span{display:block;color:rgba(255,255,255,0.65);font-weight:300;font-size:14px;margin-top:5px}.header-date{color:rgba(255,255,255,0.4);font-size:11px;margin-top:6px}.tabs{background:#fff;border-bottom:1px solid #eaeaea;padding:0 24px;display:flex}.tab-btn{padding:13px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;transition:all 0.15s}.tab-btn.active{color:#1a1a2e;border-bottom-color:#e8b86d}.tab-btn:hover:not(.active){color:#444}.content{padding:24px 28px;max-width:920px;margin:0 auto}.tab-pane{display:none}.tab-pane.active{display:block}.card{background:#fff;border-radius:12px;border:0.5px solid #e5e5e5;padding:20px 24px;margin-bottom:16px}.step-title{font-size:13px;font-weight:600;color:#1a1a2e;background:#f8f7f4;border-radius:8px;padding:9px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}.step-tag{font-size:11px;font-weight:400;color:#9a7030;background:#e8b86d22;padding:2px 8px;border-radius:20px}.checklist{list-style:none}.checklist li{padding:9px 4px;border-bottom:0.5px solid #f2f2f2;display:flex;align-items:flex-start;gap:10px}.checklist li:last-child{border-bottom:none}.checklist li.opt{opacity:0.6}.checklist input[type=checkbox]{margin-top:1px;width:15px;height:15px;cursor:pointer;accent-color:#1a1a2e;flex-shrink:0}.checklist label{font-size:13.5px;color:#333;cursor:pointer;line-height:1.5}.checklist input:checked+label{text-decoration:line-through;color:#bbb}.progress-wrap{margin-bottom:20px}.progress-bar{height:5px;background:#eee;border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#e8b86d,#c89040);border-radius:3px;transition:width 0.3s ease}.progress-info{font-size:12px;color:#999;margin-bottom:7px;display:flex;justify-content:space-between}.client-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}.client-row label{font-size:13px;color:#777}.client-name-input{flex:1;border:0.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;direction:rtl;background:#fff;color:#1a1a1a}.client-name-input:focus{outline:none;border-color:#e8b86d}.sec-heading{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid #ebebeb}.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field-item{display:flex;flex-direction:column;gap:5px}.field-item.full{grid-column:1/-1}.field-item label{font-size:11.5px;color:#999}.field-item input,.field-item textarea,.field-item select{border:0.5px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13.5px;direction:rtl;color:#1a1a1a;background:#fff;font-family:inherit}.field-item textarea{height:80px;resize:vertical}.field-item input:focus,.field-item textarea:focus,.field-item select:focus{outline:none;border-color:#e8b86d}.tracker-table{width:100%;border-collapse:collapse;font-size:13.5px}.tracker-table th{text-align:right;padding:10px 14px;font-size:11.5px;font-weight:600;color:#aaa;border-bottom:1px solid #eee;background:#fafafa}.tracker-table td{padding:13px 14px;border-bottom:0.5px solid #f2f2f2}.tracker-table tr:last-child td{border-bottom:none}.tracker-table tbody tr:hover td{background:#fefdfb}.client-name-cell{font-weight:500;color:#1a1a2e}.client-sub-cell{font-size:11.5px;color:#aaa;margin-top:2px}.sbadge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-block}.s-active{background:#d4edda;color:#155724}.summary-row{display:flex;gap:16px;margin-bottom:20px}.summary-card{flex:1;background:#fff;border:0.5px solid #e5e5e5;border-radius:10px;padding:14px 18px}.summary-card .sc-value{font-size:22px;font-weight:500;color:#1a1a2e}</style></head><body><div class="header"><div class="logo">YOU DO YOU <span>| ניהול משרד מרחוק</span></div><div class="header-date" id="hdate"></div></div><div class="tabs"><button class="tab-btn active" onclick="switchTab('onboarding',this)">אונבורדינג</button><button class="tab-btn" onclick="switchTab('card',this)">כרטיס לקוח</button><button class="tab-btn" onclick="switchTab('tracker',this)">טרקר לקוחות</button></div><div class="content"><div class="tab-pane active" id="tab-onboarding"><div class="client-row"><label>שם לקוח:</label><input class="client-name-input" type="text" id="client-name-input" placeholder="הקלידי שם לקוח..."/></div><div class="progress-wrap"><div class="progress-info"><span id="prog-txt">0 / 14</span><span id="prog-pct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div></div><div class="card"><div class="step-title">שלב 1 <span class="step-tag">סגירה עסקית</span></div><ul class="checklist"><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת תשלום</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הסכם</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת הסכם</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת הו"ק</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תיאום שיחת אפיון</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שמירת הסכם</label></li><li class="opt"><input type="checkbox" class="chk" onchange="updateProgress()"><label>הודעת ברוכים הבאים</label></li></ul></div><div class="card"><div class="step-title">שלב 2 <span class="step-tag">אפיון</span></div><ul class="checklist"><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>מילוי כרטיס לקוח</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת אנשי קשר</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>גישה ליומן גוגל</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>גישה לחשבוניות</label></li></ul></div><div class="card"><div class="step-title">שלב 3 <span class="step-tag">הקמה</span></div><ul class="checklist"><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הוספה לטרקר</label></li><li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תזכורת גבייה</label></li><li class="opt"><input type="checkbox" class="chk" onchange="updateProgress()"><label>צ'ק-אין</label></li></ul></div></div><div class="tab-pane" id="tab-card"><div class="card"><div class="sec-heading">בחר לקוח</div><select id="client-select" onchange="loadSelectedClient()" style="width:100%;padding:8px;border:0.5px solid #e0e0e0;border-radius:8px;font-size:14px;"><option value="">-- בחר --</option><option value="0">נובו נדל"ן</option></select></div><div id="client-details" style="display:none;"><div class="card"><div class="sec-heading">פרטים</div><div class="field-grid"><div class="field-item"><label>שם</label><input type="text" value="נובו נדל"ן"></div><div class="field-item"><label>אתר</label><input type="text" value="noovo.co.il"></div></div><div class="sec-heading">אנשי קשר</div><div class="field-grid"><div class="field-item"><label>אירית</label><input type="text" value="053-250-2992"></div><div class="field-item"><label>אפרת</label><input type="text" value="050-4585425"></div></div></div></div></div><div class="tab-pane" id="tab-tracker"><div class="summary-row"><div class="summary-card"><div class="sc-value">1</div></div><div class="summary-card"><div class="sc-value">₪4,700</div></div></div><div class="card"><table class="tracker-table"><thead><tr><th>לקוח</th><th>חבילה</th><th>סכום</th></tr></thead><tbody><tr><td>נובו נדל"ן</td><td>25 שעות</td><td>₪4,700</td></tr></tbody></table></div></div></div><script>function switchTab(id,btn){document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');}function updateProgress(){var all=document.querySelectorAll('.chk');var done=0;all.forEach(c=>{if(c.checked)done++;});var pct=Math.round(done/all.length*100);document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-txt').textContent=done+' / '+all.length;}function loadSelectedClient(){var idx=document.getElementById('client-select').value;document.getElementById('client-details').style.display=idx?'block':'none';}var d=new Date();document.getElementById('hdate').textContent=d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});</script></body></html>
