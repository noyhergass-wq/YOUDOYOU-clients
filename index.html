<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU DO YOU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f5f4f1; color: #333; direction: rtl; font-size: 14px; line-height: 1.5; }
    .header { background: #2a2a3a; padding: 24px 20px 20px; text-align: center; }
    .header h1 { color: #e8b86d; font-size: 26px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
    .header small { color: #888; font-size: 12px; display: block; margin-bottom: 4px; }
    .header div { color: #666; font-size: 11px; }
    .tabs { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 20px; display: flex; }
    .tabs button { padding: 14px 18px; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; font-weight: 500; color: #888; transition: 0.2s; }
    .tabs button.active { color: #1a1a2e; border-bottom-color: #e8b86d; }
    .tabs button:hover { color: #555; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
    .card-title { font-size: 12px; font-weight: 600; color: #333; background: #f9f8f6; padding: 10px 14px; border-radius: 7px; margin-bottom: 14px; }
    .checklist { list-style: none; }
    .checklist li { padding: 8px 0; border-bottom: 0.5px solid #f2f2f2; display: flex; align-items: flex-start; gap: 10px; }
    .checklist li:last-child { border-bottom: none; }
    .checklist input[type=checkbox] { margin-top: 2px; width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a2e; flex-shrink: 0; }
    .checklist label { cursor: pointer; flex: 1; font-size: 13px; color: #444; }
    .checklist input[type=checkbox]:checked + label { text-decoration: line-through; color: #bbb; }
    .progress { background: #efefef; height: 5px; border-radius: 2px; margin: 10px 0; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #e8b86d, #d4a052); height: 100%; width: 0%; transition: width 0.3s ease; }
  </style>
</head>
<body>

<div class="header">
  <h1>YOU DO YOU</h1>
  <small>ניהול משרד מרחוק</small>
  <div id="date-display" style="color: #666; font-size: 12px; margin-top: 6px;"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('onboarding', this)">אונבורדינג</button>
  <button class="tab-btn" onclick="showTab('card', this)">כרטיס לקוח</button>
  <button class="tab-btn" onclick="showTab('tracker', this)">טרקר</button>
</div>

<div class="container">

<!-- ONBOARDING -->
<div class="tab active" id="onboarding">
  <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
    <label style="font-size: 13px; color: #777; white-space: nowrap;">שם לקוח:</label>
    <input type="text" id="client-name-input" placeholder="הקלידי שם לקוח..." style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; direction: rtl;">
  </div>
  <div style="margin-bottom: 16px; font-size: 12px; color: #999; text-align: center;">
    <span id="prog-text-top">0 / 14 סעיפים</span>
    <div class="progress" style="margin-top: 6px;"><div class="progress-fill" id="prog-fill-top"></div></div>
  </div>
  <div class="card">
    <div class="card-title">שלב 1 — סגירה עסקית</div>
    <ul class="checklist">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת תשלום ראשון באשראי טלפוני</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הסכם לחתימה דיגיטלית</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת הסכם חתום</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת הוראת קבע (הו"ק)</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תיאום שיחת האפיון (45–60 דקות) — נקבע בשיחת המכירה</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שמירת ההסכם החתום בתיקיית ההסכמים בדרייב</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הודעת ברוכים הבאים (אופציונלי)</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="card-title">שלב 2 — שיחת האפיון (45–60 דקות)</div>
    <ul class="checklist">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>מילוי כרטיס לקוח במהלך השיחה</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת רשימת אנשי קשר קבועים (רו"ח, עו"ד, לקוחות/ספקים)</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת גישה ליומן גוגל</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת גישה לחשבונית ירוקה / כלי חשבוניות</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="card-title">שלב 3 — הקמה ומעבר לשוטף</div>
    <ul class="checklist">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הוספת הלקוח לטרקר הלקוחות</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת תזכורת גבייה לא' לחודש</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שיחת צ'ק-אין קצרה אחרי שבוע ראשון (אופציונלי)</label></li>
    </ul>
    <div style="margin-top: 12px; font-size: 12px; color: #999; text-align: center;">
      <span id="prog-text">0 / 14 סעיפים</span>
      <div class="progress"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
  </div>
</div>

<!-- CLIENT CARD -->
<div class="tab" id="card">
  <div class="card">
    <div class="card-title">בחר לקוח</div>
    <div style="display: flex; gap: 10px; margin-bottom: 16px;">
      <select id="client-select" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; direction: rtl;">
        <option value="">-- בחר לקוח קיים --</option>
      </select>
      <button onclick="newClient()" style="padding: 10px 16px; background: #e8b86d; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;">לקוח חדש</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">פרטי לקוח</div>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">שם לקוח</label>
      <input type="text" id="client-name" placeholder="שם הלקוח" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; direction: rtl;">
    </div>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">שעות לחודש</label>
      <input type="number" id="client-hours" placeholder="25" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; direction: rtl;">
    </div>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">עלות חודשית</label>
      <input type="number" id="client-cost" placeholder="4700" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; direction: rtl;">
    </div>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">אנשי קשר (שם + טלפון, שורה אחת לכל אדם)</label>
      <textarea id="client-contacts" placeholder="אירית ליברמן: 053-250-2992&#10;אפרת פרנקו: 050-4585425" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; direction: rtl; min-height: 80px; font-family: inherit;"></textarea>
    </div>
  </div>

  <div class="card">
    <button onclick="saveClient()" style="width: 100%; padding: 12px; background: #1a1a2e; color: #e8b86d; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600;">שמור לקוח</button>
  </div>

  <div class="card" id="client-preview" style="display: none;">
    <div class="card-title">צפייה</div>
    <div id="preview-content"></div>
  </div>
</div>

<!-- TRACKER -->
<div class="tab" id="tracker">
  <div class="card">
    <div class="card-title">סיכום</div>
    <p>לקוחות פעילים: 1</p>
    <p>הכנסה: 4,700 ש"ח</p>
  </div>
  <div class="card">
    <div class="card-title">לקוחות</div>
    <p>נובו נדל"ן - 25 שעות - פעיל</p>
  </div>
</div>

</div>

<script>
function showTab(name, btn) {
  var ob = document.getElementById('onboarding');
  var cd = document.getElementById('card');
  var tr = document.getElementById('tracker');
  if (ob) ob.style.display = 'none';
  if (cd) cd.style.display = 'none';
  if (tr) tr.style.display = 'none';
  var target = document.getElementById(name);
  if (target) target.style.display = 'block';
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function updateProgress() {
  var all = document.querySelectorAll('.chk');
  var done = 0;
  for (var i = 0; i < all.length; i++) if (all[i].checked) done++;
  var pct = Math.round(done / all.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' / ' + all.length;
  document.getElementById('prog-text-top').textContent = done + ' / ' + all.length;
  saveCheckboxes();
}

function saveCheckboxes() {
  var all = document.querySelectorAll('.chk');
  var states = [];
  for (var i = 0; i < all.length; i++) states.push(all[i].checked ? 1 : 0);
  localStorage.setItem('onboarding_checkboxes', JSON.stringify(states));
}

function loadCheckboxes() {
  var saved = localStorage.getItem('onboarding_checkboxes');
  if (saved) {
    var states = JSON.parse(saved);
    var all = document.querySelectorAll('.chk');
    for (var i = 0; i < all.length && i < states.length; i++) {
      all[i].checked = states[i] === 1;
    }
    updateProgress();
  }
}

function loadClients() {
  var saved = localStorage.getItem('youdoyou_clients');
  return saved ? JSON.parse(saved) : {'נובו נדל"ן': {hours: 25, cost: 4700, contacts: 'אירית ליברמן: 053-250-2992\nאפרת פרנקו: 050-4585425'}};
}

function saveClients(clients) {
  localStorage.setItem('youdoyou_clients', JSON.stringify(clients));
}

function populateClientSelect() {
  var clients = loadClients();
  var select = document.getElementById('client-select');
  if (!select) return;
  select.innerHTML = '<option value="">-- בחר לקוח קיים --</option>';
  for (var name in clients) {
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  }
}

function loadClientToForm(clientName) {
  var clients = loadClients();
  if (clients[clientName]) {
    var client = clients[clientName];
    document.getElementById('client-name').value = clientName;
    document.getElementById('client-hours').value = client.hours;
    document.getElementById('client-cost').value = client.cost;
    document.getElementById('client-contacts').value = client.contacts;
    showPreview(clientName);
  }
}

function newClient() {
  document.getElementById('client-select').value = '';
  document.getElementById('client-name').value = '';
  document.getElementById('client-hours').value = '';
  document.getElementById('client-cost').value = '';
  document.getElementById('client-contacts').value = '';
  document.getElementById('client-preview').style.display = 'none';
}

function saveClient() {
  var name = document.getElementById('client-name').value.trim();
  if (!name) { alert('הזן שם לקוח'); return; }

  var clients = loadClients();
  clients[name] = {
    hours: parseInt(document.getElementById('client-hours').value) || 0,
    cost: parseInt(document.getElementById('client-cost').value) || 0,
    contacts: document.getElementById('client-contacts').value
  };
  saveClients(clients);
  populateClientSelect();
  showPreview(name);
  alert('לקוח נשמר בהצלחה!');
}

function showPreview(clientName) {
  var clients = loadClients();
  if (clients[clientName]) {
    var client = clients[clientName];
    var html = '<p><strong>' + clientName + '</strong></p>' +
               '<p>' + client.hours + ' שעות לחודש</p>' +
               '<p>₪' + client.cost + '</p>' +
               '<div style="margin-top: 12px; font-size: 13px;">' +
               '<strong>אנשי קשר:</strong><br>';
    var contacts = client.contacts.split('\n');
    for (var i = 0; i < contacts.length; i++) {
      if (contacts[i].trim()) html += contacts[i] + '<br>';
    }
    html += '</div>';
    document.getElementById('preview-content').innerHTML = html;
    document.getElementById('client-preview').style.display = 'block';
  }
}

function initPage() {
  loadCheckboxes();
  populateClientSelect();
  var select = document.getElementById('client-select');
  if (select) {
    select.addEventListener('change', function() {
      if (this.value) loadClientToForm(this.value);
    });
  }
  var d = new Date();
  document.getElementById('date-display').textContent = d.toLocaleDateString('he-IL');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initPage);
} else {
  initPage();
}
</script>

</body>
</html>
