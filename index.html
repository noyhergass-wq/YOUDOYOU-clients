<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU DO YOU — ניהול לקוחות</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f4f1; color: #1a1a1a; direction: rtl; font-size: 14px; }
    .header { background: #1a1a2e; padding: 28px; text-align: center; color: #e8b86d; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header small { display: block; color: rgba(255,255,255,0.6); font-size: 12px; }
    .tabs { background: #fff; border-bottom: 1px solid #eee; padding: 0 24px; display: flex; }
    .tabs button { padding: 14px 20px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 14px; font-weight: 500; }
    .tabs button.active { color: #1a1a2e; border-bottom-color: #e8b86d; }
    .tabs button:hover { color: #444; }
    .container { padding: 24px 28px; max-width: 960px; margin: 0 auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .sec-title { font-size: 13px; font-weight: 600; color: #1a1a2e; background: #f8f7f4; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-row.full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11.5px; color: #999; }
    .field input, .field select, .field textarea { border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px; font-size: 13.5px; direction: rtl; font-family: inherit; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #e8b86d; }
    .field textarea { height: 80px; resize: vertical; }
    .checkbox-list { list-style: none; }
    .checkbox-list li { padding: 8px 0; border-bottom: 1px solid #f2f2f2; display: flex; gap: 10px; }
    .checkbox-list li:last-child { border-bottom: none; }
    .checkbox-list input { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-list label { cursor: pointer; flex: 1; }
    .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin: 8px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #e8b86d, #c89040); transition: width 0.3s; }
    .progress-text { font-size: 12px; color: #999; text-align: center; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: right; padding: 10px; font-weight: 600; background: #fafafa; border-bottom: 1px solid #eee; font-size: 12px; color: #999; }
    td { padding: 12px 10px; border-bottom: 1px solid #f2f2f2; }
    tr:hover td { background: #fefdfb; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-active { background: #d4edda; color: #155724; }
    .summary { display: flex; gap: 16px; margin-bottom: 20px; }
    .summary-card { flex: 1; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; }
    .summary-card .label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .summary-card .value { font-size: 24px; font-weight: 600; color: #1a1a2e; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }
    .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2a2a3e; }
    .select { width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; direction: rtl; }
  </style>
</head>
<body>

<div class="header">
  <h1>YOU DO YOU</h1>
  <small>| ניהול משרד מרחוק</small>
  <div id="date-header" style="color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 6px;"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('onboarding', this)">אונבורדינג</button>
  <button class="tab-btn" onclick="showTab('card', this)">כרטיס לקוח</button>
  <button class="tab-btn" onclick="showTab('tracker', this)">טרקר לקוחות</button>
</div>

<div class="container">

<!-- ONBOARDING TAB -->
<div class="tab active" id="onboarding">
  <div class="card">
    <div class="sec-title">שלב 1 — סגירה עסקית</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת תשלום ראשון באשראי טלפוני</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הסכם לחתימה דיגיטלית</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת הסכם חתום</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת הוראת קבע (הו"ק)</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>תיאום שיחת האפיון (45–60 דקות)</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>שמירת ההסכם החתום בתיקייה</label></li>
      <li style="opacity: 0.6;"><input type="checkbox" class="chk" onchange="updateProgress()"><label>שליחת הודעת ברוכים הבאים (אופציונלי)</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="sec-title">שלב 2 — שיחת האפיון</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>מילוי כרטיס לקוח במהלך השיחה</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת רשימת אנשי קשר</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת גישה ליומן גוגל</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>קבלת גישה לחשבוניות</label></li>
    </ul>
  </div>
  <div class="card">
    <div class="sec-title">שלב 3 — הקמה ומעבר לשוטף</div>
    <ul class="checkbox-list">
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הוספת הלקוח לטרקר</label></li>
      <li><input type="checkbox" class="chk" onchange="updateProgress()"><label>הגדרת תזכורת גבייה</label></li>
      <li style="opacity: 0.6;"><input type="checkbox" class="chk" onchange="updateProgress()"><label>צ'ק-אין אחרי שבוע (אופציונלי)</label></li>
    </ul>
    <div class="progress-text" id="prog-text">0 / 14 סעיפים (0%)</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width: 0%;"></div></div>
  </div>
</div>

<!-- CLIENT CARD TAB -->
<div class="tab" id="card">
  <div class="card">
    <div class="sec-title">בחר לקוח</div>
    <select class="select" id="client-select" onchange="loadClient()">
      <option value="">-- בחר לקוח --</option>
      <option value="0">נובו נדל"ן</option>
    </select>
  </div>
  <div id="client-form" style="display: none;">
    <div class="card">
      <div class="sec-title">פרטים בסיסיים</div>
      <div class="field-row">
        <div class="field"><label>שם הלקוח</label><input type="text" id="f-name" value="נובו נדל"ן"></div>
        <div class="field"><label>אתר</label><input type="text" id="f-website" value="noovo.co.il"></div>
      </div>
      <div class="field-row full">
        <div class="field"><label>תחום עיסוק</label><input type="text" id="f-field" value="ניהול וקידום הליכי תכנון"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>תחילת עבודה</label><input type="date" id="f-start" value="2024-06-01"></div>
        <div class="field"><label>חבילה</label><input type="text" id="f-package" value="בינונית — 25 שעות"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>סכום חודשי</label><input type="text" id="f-amount" value="4700"></div>
        <div class="field"><label>תשלום</label><input type="text" id="f-payment" value="הו"ק ב-1 לחודש"></div>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">אנשי קשר</div>
      <div class="field-row">
        <div class="field"><label>שם — איש קשר 1</label><input type="text" id="f-c1-name" value="אירית ליברמן"></div>
        <div class="field"><label>תפקיד</label><input type="text" id="f-c1-role" value="כלכלנית ושמאית"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>טלפון</label><input type="tel" id="f-c1-phone" value="053-250-2992"></div>
        <div class="field"><label>מייל</label><input type="email" id="f-c1-email" value="irit@noovo.co.il"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>שם — איש קשר 2</label><input type="text" id="f-c2-name" value="אפרת פרנקו"></div>
        <di
